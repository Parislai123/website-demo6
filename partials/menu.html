<!-- Mobile Menu Toggle (獨立於 hero-header 之外，避免被隱藏) -->
 <!-- Intentional CSS toggle:
     Use checkbox + label to avoid JS dependency and ensure menu works before JS loads
  -->
  <!-- Structure constraint (同 :checked ~ .menu-pane selector 有關, 一移位就全壞):
      Checkbox must be a sibling of menu-pane
      for CSS :checked selectors to work
  -->     
<div class="mobile-toggle-wrapper">
  <input type="checkbox" id="openmenu" class="hamburger-checkbox">
  <label for="openmenu" class="hamburger-icon" id="hamburger-label">
    <span class="icon-open"></span>
    <span class="icon-close"></span>
  </label>
